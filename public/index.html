<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus 2.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container">
        <!-- LOGIN SCREEN (Starts Visible) -->
        <div id="login-screen" class="full-screen-view">
            <h1>Nexus</h1>
            <div class="form-group">
                <label for="player-name">Your Name</label>
                <input type="text" id="player-name" placeholder="e.g., Alex Chen">
            </div>
            <div class="form-group consent-group">
                <input type="checkbox" id="consent-checkbox">
                <label for="consent-checkbox">I understand this is for a research study and agree to participate.</label>
            </div>
            <button id="start-semester-btn" class="action-button" disabled>Begin Semester</button>
        </div>

        <!-- MAIN GAME SCREEN (Starts Hidden) -->
        <div id="game-screen" class="hidden">
            <div id="main-screen">
                <div id="game-content">
                    <div id="calendar-zone">
                        <span id="week-display"></span>
                    </div>
                    <div class="game-section">
                        <p class="section-title">Life Event</p>
                        <div id="life-event-zone"></div>
                    </div>
                    <div class="game-section">
                        <p class="section-title">Create a Post</p>
                        <div id="post-options-zone"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ENDGAME MODAL -->
        <div id="end-game-splash" class="modal-overlay hidden">
             <div class="modal-content final-splash">
                <h2>Semester Over</h2>
                <p>Your first week is complete. Thank you for participating.</p>
                <button id="replay-btn" class="action-button">Replay</button>
             </div>
        </div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
